services:
  - type: web
    name: arcreflex-orchestrator
    env: python
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.render.txt
    startCommand: uvicorn orchestrator.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ARCREFLEX_ALLOW_INSECURE_DEMO
        value: "true"
      - key: ARCREFLEX_ALLOW_SYNTHETIC_SETTLEMENT_FALLBACK
        value: "false"
    autoDeploy: true
    healthCheckPath: /health

  - type: web
    name: search-a
    env: python
    plan: free
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.render.txt
    startCommand: uvicorn agents.search_a.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health

